<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- NAV BAR -->

    <section id="main">
        <section class="navBar">
            <nav>
                <div class="leftNav">
                    <div class="icon i1"><i class="fa-solid fa-bars"></i></div>
                    <div class="icon i2"><i class="fa-solid fa-bell"></i></div>

                </div>



                <div class="centerNav">
                    <div class="icon i3">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" placeholder="location">
                    </div>

                    <div class="icon i4">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search City">
                    </div>
                </div>
                <div class="midNav">

                    <div class="icon i7">
                        <button class="premium"><span><i class="fa-solid fa-crown"></i><span>Go
                                </span></span><span>Premium</span></button>
                    </div>
                </div>
                <div class="rightNav">
                    <div class="icon i5">
                        <button class="toggle"><i class="fa-solid fa-moon"></i></button>
                    </div>
                    <div class="icon i6">
                        <img src="profile.jpg" alt="">
                    </div>
                </div>

            </nav>
        </section>







































    </section>
</body>

</html>
